# Render deployment configuration for backend
services:
  # FastAPI Backend
  - type: web
    name: accident-prediction-api
    env: python
    region: frankfurt  # or oregon, singapore
    plan: free  # or starter ($7/month)
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: MODEL_PATH
        value: /opt/render/project/src/models
      - key: DATA_PATH
        value: /opt/render/project/src/data
    healthCheckPath: /api/health
    
